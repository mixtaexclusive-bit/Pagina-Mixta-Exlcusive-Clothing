name: Deploy Netlify Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: netlify-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOOGLE_SHEET_ID: "2PACX-1vTn_EC3r8qz-zWlS3yFV3wBFn55QgDgCbndcnK-QTnrnECLA74r8fgdngaflkEXCuX6tYuXH921B7x3"
      GOOGLE_SHEET_GID: "0"
      NEXT_PUBLIC_WHATSAPP_NUMBER: "573226821174"
      NEXT_PUBLIC_STORE_NAME: "EXCLUSIVE CLOTHING"
      NETLIFY_SITE_ID: "ab09cae5-702a-4ca7-b87b-13a7f169aabd"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify Netlify token
        env:
          TOKEN_PRIMARY: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          TOKEN_ALIAS: ${{ secrets.NETLIFY_TOKEN }}
        run: |
          if [ -n "$TOKEN_PRIMARY" ]; then
            echo "NETLIFY_AUTH_TOKEN=$TOKEN_PRIMARY" >> "$GITHUB_ENV"
          elif [ -n "$TOKEN_ALIAS" ]; then
            echo "NETLIFY_AUTH_TOKEN=$TOKEN_ALIAS" >> "$GITHUB_ENV"
          else
            echo "::error::Agrega el token en GitHub → Settings → Secrets → Actions como NETLIFY_AUTH_TOKEN"
            exit 1
          fi

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Deploy to Netlify (build + publish)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: npx netlify deploy --prod --build --site="$NETLIFY_SITE_ID"
